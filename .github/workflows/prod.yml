name: Build & App Store (Prod)

on:
  push:
    branches:
      - main
      - master
      - prod
      - production
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (faster build)'
        required: false
        default: 'false'
        type: boolean

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
  FASTLANE_SESSION: ${{ secrets.FASTLANE_SESSION }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  build-prod-ios:
    name: Build Production iOS IPA
    needs: lint
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Install Ruby gems
        run: bundle install

      - name: Configure EAS credentials
        run: |
          echo "EXPO_TOKEN=$EXPO_TOKEN" >> .env
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> .env

      - name: Build iOS (Production)
        run: eas build --platform ios --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ env.EXPO_TOKEN }}

      - name: Submit to App Store
        run: |
          eas submit --platform ios --profile production --latest \
            --apple-team-id "$APPLE_TEAM_ID" \
            --apple-id "$APPLE_ID" \
            --app-specific-password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ env.EXPO_TOKEN }}

  build-prod-android:
    name: Build Production Android APK/AAB
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Build Android (Production)
        run: eas build --platform android --profile production --non-interactive

  verify-firestore-rules:
    name: Verify Firestore Security Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Verify Firestore Rules
        run: firebase firestore:rules:verify --project=${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  verify-storage-rules:
    name: Verify Storage Security Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Verify Storage Rules
        run: firebase storage:rules:verify --project=${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  deploy-functions:
    name: Deploy Firebase Functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
        working-directory: ./functions

      - name: Install dependencies
        run: npm ci

      - name: Deploy Functions
        run: firebase deploy --only functions --project=${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  notify:
    name: Notify on completion
    needs: [build-prod-ios, build-prod-android, verify-firestore-rules, verify-storage-rules, deploy-functions]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Production Build Results" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| iOS App Store | ${{ needs.build-prod-ios.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android Play Store | ${{ needs.build-prod-android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firestore Rules | ${{ needs.verify-firestore-rules.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Storage Rules | ${{ needs.verify-storage-rules.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firebase Functions | ${{ needs.deploy-functions.result }} |" >> $GITHUB_STEP_SUMMARY
