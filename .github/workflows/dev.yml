name: Build & TestFlight (Dev)

on:
  push:
    branches:
      - dev
      - develop
      - development
  pull_request:
    branches:
      - dev
      - develop
      - development

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
  FASTLANE_SESSION: ${{ secrets.FASTLANE_SESSION }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  build-dev:
    name: Build Dev IPA (TestFlight)
    needs: lint
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Install Ruby gems
        run: bundle install

      - name: Configure EAS credentials
        run: |
          echo "EXPO_TOKEN=$EXPO_TOKEN" >> .env
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> .env

      - name: Build iOS (Dev)
        run: eas build --platform ios --profile preview --non-interactive

      - name: Submit to TestFlight
        run: |
          eas submit --platform ios --profile preview --latest \
            --apple-team-id "$APPLE_TEAM_ID" \
            --apple-id "$APPLE_ID" \
            --app-specific-password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ env.EXPO_TOKEN }}

  build-android-dev:
    name: Build Android APK (Dev)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Build Android (Dev)
        run: eas build --platform android --profile preview --non-interactive

  notify:
    name: Notify on completion
    needs: [build-dev, build-android-dev]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Dev Build Results" >> $GITHUB_STEP_SUMMARY
          echo "- iOS TestFlight: ${{ needs.build-dev.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Android APK: ${{ needs.build-android-dev.result }}" >> $GITHUB_STEP_SUMMARY
